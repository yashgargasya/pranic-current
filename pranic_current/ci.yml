name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Types
        run: mypy pranic_current
        continue-on-error: true

      - name: Test the rule engine
        run: pytest tests/ -q

      - name: Smoke-test the ephemeris
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from pranic_current import panchanga as pc
          from pranic_current.swara import state_at, sunrise_svara

          # Varanasi, so a wrong-hemisphere longitude sign fails loudly.
          place = pc.Place("Varanasi", 25.3176, 82.9739, "Asia/Kolkata")
          now = datetime.now(ZoneInfo("Asia/Kolkata"))
          p = pc.compute(now, place)
          st = state_at(now, p.sunrise, p.tithi_index, )
          assert 4 <= p.sunrise.hour <= 8, f"implausible sunrise {p.sunrise}"
          assert p.sunset > p.sunrise
          assert 0 <= p.tithi_index <= 29
          assert sunrise_svara(p.tithi_index) in ("ida", "pingala")
          print(*p.as_lines(), sep="\n")
          print("prescribed now:", st.effective_svara.sanskrit, "/", st.tattva.sanskrit)
          PY
